<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg"
     width="1024"
     height="1024"
     viewBox="0 0 1024 1024"
     role="img"
     aria-label="Bank transfer logo in rounded white square">

  <defs>
    <linearGradient id="blueGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#2E80E8"/>
      <stop offset="100%" stop-color="#2368D6"/>
    </linearGradient>

    <filter id="panelShadow"
            x="-20%"
            y="-20%"
            width="140%"
            height="140%">
      <feDropShadow dx="0"
                    dy="12"
                    stdDeviation="18"
                    flood-color="#000000"
                    flood-opacity="0.14"/>
    </filter>
  </defs>

  <!-- Transparent outside -->
  <rect x="86"
        y="86"
        width="852"
        height="852"
        rx="155"
        fill="#FFFFFF"
        filter="url(#panelShadow)"/>

  <!-- Bank icon -->
  <g fill="url(#blueGrad)" transform="translate(0,8)">

    <!-- Roof -->
    <path d="M512 220 L686 301 L686 334 L338 334 L338 301 Z"/>

    <!-- Entablature -->
    <rect x="352" y="344" width="320" height="22"/>

    <!-- Columns -->
    <rect x="362" y="377" width="38" height="222"/>
    <rect x="455" y="377" width="38" height="222"/>
    <rect x="548" y="377" width="38" height="222"/>
    <rect x="641" y="377" width="38" height="222"/>

    <!-- Column capitals -->
    <rect x="349" y="366" width="64" height="18"/>
    <rect x="442" y="366" width="64" height="18"/>
    <rect x="535" y="366" width="64" height="18"/>
    <rect x="628" y="366" width="64" height="18"/>

    <!-- Column bases -->
    <rect x="349" y="588" width="64" height="18"/>
    <rect x="442" y="588" width="64" height="18"/>
    <rect x="535" y="588" width="64" height="18"/>
    <rect x="628" y="588" width="64" height="18"/>

    <!-- Base -->
    <rect x="338" y="616" width="348" height="28"/>
  </g>

  <!-- Centered text -->
  <g fill="url(#blueGrad)"
     font-family="Arial, Helvetica, sans-serif"
     font-weight="700"
     text-anchor="middle">

    <text x="512"
          y="752"
          font-size="118"
          letter-spacing="2">
      BANK
    </text>

    <text x="512"
          y="888"
          font-size="118"
          letter-spacing="2">
      TRANSFER
    </text>
  </g>
</svg>
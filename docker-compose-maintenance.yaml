name: mediacms-maintenance

services:
  maintenance:
    image: nginx:1.27-alpine
    container_name: mediacms-maintenance
    restart: unless-stopped
    ports:
      - "${MAINTENANCE_HTTP_BIND:-127.0.0.1}:${MAINTENANCE_HTTP_PORT:-8088}:80"
    volumes:
      - ./maintenance/maintenance.html:/usr/share/nginx/html/maintenance.html:ro
      - ./maintenance/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1/healthz >/dev/null 2>&1 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3

  cloudflared-maintenance:
    image: cloudflare/cloudflared:latest
    container_name: mediacms-maintenance-cloudflared
    restart: unless-stopped
    profiles:
      - cloudflare
    command: tunnel --no-autoupdate run --token ${MAINTENANCE_TUNNEL_TOKEN}
    environment:
      TUNNEL_TOKEN: ${MAINTENANCE_TUNNEL_TOKEN}
    depends_on:
      maintenance:
        condition: service_healthy

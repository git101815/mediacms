<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Mt Pelerin checkout</title>
  <style nonce="{{ mtpelerin_csp_nonce }}">
    :root {
      color-scheme: dark;
    }

    html,
    body {
      width: 100%;
      height: 100%;
      margin: 0;
      background: #101114;
      color: #f3f4f6;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    body {
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      padding: 10px 16px;
      box-sizing: border-box;
      background: #17191e;
      border-bottom: 1px solid #2a2d33;
    }

    #mtp-status {
      margin: 0;
      color: #f3f4f6;
      font-weight: 600;
      line-height: 1.4;
    }

    nav {
      flex: 0 0 auto;
      white-space: nowrap;
    }

    a {
      color: #fff;
    }

    iframe {
      display: block;
      flex: 1 1 auto;
      width: 100%;
      min-height: 0;
      border: 0;
      background: #fff;
    }

    @media (max-width: 700px) {
      header {
        align-items: flex-start;
        flex-direction: column;
      }
    }
  </style>
</head>
<body>
  <header>
    <p id="mtp-status">Opening secure checkout…</p>
    <nav>
      <a href="{{ mtpelerin_launch.session_url }}">View top-up status</a>
      ·
      <a href="{{ mtpelerin_launch.wallet_url }}">Return to wallet</a>
    </nav>
  </header>

  <iframe
    id="mtp-frame"
    allow="usb; ethereum; clipboard-write; payment; microphone; camera"
    loading="eager"
    referrerpolicy="origin"
    title="Mt Pelerin exchange widget"
  ></iframe>

  <form hidden>
    {% csrf_token %}
  </form>
  <script nonce="{{ mtpelerin_csp_nonce }}">
  (function () {
    "use strict";

    const widgetOrigin = "{{ mtpelerin_widget_origin|escapejs }}";
    const iframeUrl = "{{ mtpelerin_launch.embed_url|escapejs }}";
    const eventUrl = "{{ mtpelerin_launch.event_url|escapejs }}";
    const sessionUrl = "{{ mtpelerin_launch.session_url|escapejs }}";
    const statusNode = document.getElementById("mtp-status");
    const frame = document.getElementById("mtp-frame");
    const csrfNode = document.querySelector("[name=csrfmiddlewaretoken]");
    const sentKeys = new Set();

    function parseMessage(value) {
      if (typeof value === "string") {
        try {
          return JSON.parse(value);
        } catch (error) {
          return null;
        }
      }
      return value;
    }

    async function sendEvent(message) {
      const eventType = String(message.type || "");
      if (eventType !== "orderCreated" && eventType !== "paymentSubmitted") {
        return;
      }

      const data = (
        message.data && typeof message.data === "object"
      ) ? message.data : {};
      const eventKey = eventType + ":" + String(
        data.paymentId || data.id || ""
      );
      if (sentKeys.has(eventKey)) {
        return;
      }
      sentKeys.add(eventKey);

      const response = await fetch(eventUrl, {
        method: "POST",
        credentials: "same-origin",
        headers: {
          "Content-Type": "application/json",
          "X-CSRFToken": csrfNode ? csrfNode.value : "",
          "X-Requested-With": "XMLHttpRequest"
        },
        body: JSON.stringify({
          type: eventType,
          data: data
        })
      });

      const payload = await response.json().catch(function () {
        return {};
      });
      if (!response.ok) {
        sentKeys.delete(eventKey);
        throw new Error(payload.error || "Unable to record Mt Pelerin event");
      }

      if (eventType === "orderCreated") {
        statusNode.textContent = "Bank transfer instructions generated.";
      } else {
        statusNode.textContent = (
          "Waiting for transaction to complete (can take several days)."
        );
        window.setTimeout(function () {
          window.location.assign(sessionUrl);
        }, 1200);
      }
    }

    window.addEventListener("message", function (event) {
      if (
        event.origin !== widgetOrigin
        || !frame
        || event.source !== frame.contentWindow
      ) {
        return;
      }
      const message = parseMessage(event.data);
      if (!message || typeof message !== "object") {
        return;
      }
      sendEvent(message).catch(function (error) {
        statusNode.textContent = error.message;
      });
    });

    if (!frame || !iframeUrl) {
      statusNode.textContent = "Mt Pelerin widget configuration is missing.";
      return;
    }

    frame.addEventListener("load", function () {
      statusNode.textContent = "Complete the Mt Pelerin bank-transfer flow below.";
    });
    frame.src = iframeUrl;
  })();
  </script>
</body>
</html>

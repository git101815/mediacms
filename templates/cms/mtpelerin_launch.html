<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Mt Pelerin checkout</title>
  <style nonce="{{ mtpelerin_csp_nonce }}">
    :root { color-scheme: dark; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: #101114;
      color: #f3f4f6;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }
    main {
      width: min(560px, calc(100% - 32px));
      padding: 32px;
      box-sizing: border-box;
      border: 1px solid #2a2d33;
      border-radius: 16px;
      background: #17191e;
      text-align: center;
    }
    h1 { margin: 0 0 12px; font-size: 24px; }
    p { margin: 8px 0; color: #c7cad1; line-height: 1.5; }
    a { color: #fff; }
    .status { margin-top: 18px; font-weight: 600; color: #fff; }
  </style>
</head>
<body>
  <main>
    <h1>Mt Pelerin bank transfer</h1>
    <p>
      Complete the Mt Pelerin flow in this tab. No MediaCMS profile
      information is pre-filled.
    </p>
    <p class="status" id="mtp-status">Opening secure checkout…</p>
    <p>
      <a href="{{ mtpelerin_launch.session_url }}">View top-up status</a>
      ·
      <a href="{{ mtpelerin_launch.wallet_url }}">Return to wallet</a>
    </p>
  </main>

  <form hidden>
    {% csrf_token %}
  </form>
  <script
    nonce="{{ mtpelerin_csp_nonce }}"
    src="{{ mtpelerin_widget_script_url }}"
  ></script>
  <script nonce="{{ mtpelerin_csp_nonce }}">
  (function () {
    "use strict";

    const widgetOrigin = "{{ mtpelerin_widget_origin|escapejs }}";
    const eventUrl = "{{ mtpelerin_launch.event_url|escapejs }}";
    const sessionUrl = "{{ mtpelerin_launch.session_url|escapejs }}";
    const statusNode = document.getElementById("mtp-status");
    const csrfNode = document.querySelector("[name=csrfmiddlewaretoken]");
    const widgetOptionsJson = (
      "{{ mtpelerin_widget_options_json|escapejs }}"
    );
    const sentKeys = new Set();

    function parseMessage(value) {
      if (typeof value === "string") {
        try {
          return JSON.parse(value);
        } catch (error) {
          return null;
        }
      }
      return value;
    }

    async function sendEvent(message) {
      const eventType = String(message.type || "");
      if (eventType !== "orderCreated" && eventType !== "paymentSubmitted") {
        return;
      }

      const data = (
        message.data && typeof message.data === "object"
      ) ? message.data : {};
      const eventKey = eventType + ":" + String(
        data.paymentId || data.id || ""
      );
      if (sentKeys.has(eventKey)) {
        return;
      }
      sentKeys.add(eventKey);

      const response = await fetch(eventUrl, {
        method: "POST",
        credentials: "same-origin",
        headers: {
          "Content-Type": "application/json",
          "X-CSRFToken": csrfNode ? csrfNode.value : "",
          "X-Requested-With": "XMLHttpRequest"
        },
        body: JSON.stringify({
          type: eventType,
          data: data
        })
      });

      const payload = await response.json().catch(function () {
        return {};
      });
      if (!response.ok) {
        sentKeys.delete(eventKey);
        throw new Error(payload.error || "Unable to record Mt Pelerin event");
      }

      if (eventType === "orderCreated") {
        statusNode.textContent = "Bank transfer instructions generated.";
      } else {
        statusNode.textContent = (
          "Waiting for transaction to complete (can take several days)."
        );
        window.setTimeout(function () {
          window.location.assign(sessionUrl);
        }, 1200);
      }
    }

    window.addEventListener("message", function (event) {
      if (event.origin !== widgetOrigin) {
        return;
      }
      const message = parseMessage(event.data);
      if (!message || typeof message !== "object") {
        return;
      }
      sendEvent(message).catch(function (error) {
        statusNode.textContent = error.message;
      });
    });

    try {
      const options = JSON.parse(widgetOptionsJson);
      if (typeof window.showMtpModal !== "function") {
        throw new Error("Mt Pelerin widget failed to load");
      }
      window.showMtpModal(options);
    } catch (error) {
      statusNode.textContent = error.message;
    }
  })();
  </script>
</body>
</html>

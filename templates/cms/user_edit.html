{% extends "base.html" %}
{% load static %}
{% block headtitle %}Edit profile - {% endblock headtitle %}

{% block innercontent %}

<div class="user-action-form-wrap">
	<div class="user-action-form-inner">
		<h1>Edit Profile</h1>
                <button type="button" class="email_manager" onclick="location.href='{% url 'account_email' %}'">Manage my e-mail address</button>
		<form enctype="multipart/form-data" action="" method="post" class="post-form">
			{% csrf_token %}
			{{ form.as_p }}
                        <p class = primaryAction>(Profile picture takes 20min to update, please be patient)</p>
			<button class="primaryAction" type="submit">Update Profile</button>
		</form>
	</div>
</div>
{% endblock innercontent %}

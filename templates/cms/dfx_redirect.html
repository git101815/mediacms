<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="robots" content="noindex,nofollow,noarchive">
  <title>Opening DFX</title>
  <style>
    :root {
      color-scheme: dark;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #101114;
      color: #f5f6f8;
    }
    * { box-sizing: border-box; }
    body {
      min-height: 100vh;
      margin: 0;
      display: grid;
      place-items: center;
      padding: 24px;
    }
    main {
      width: min(520px, 100%);
      padding: 32px;
      border: 1px solid #30333a;
      border-radius: 16px;
      background: #191b20;
      text-align: center;
    }
    h1 {
      margin: 0 0 12px;
      font-size: 1.45rem;
    }
    p {
      margin: 0;
      color: #c7cad1;
      line-height: 1.5;
      overflow-wrap: anywhere;
    }
    a {
      display: inline-block;
      margin-top: 20px;
      color: #f5f6f8;
    }
  </style>
</head>
<body>
  <main>
    <h1>Opening DFX</h1>
    <p data-dfx-status>Preparing the secure bank-transfer checkout...</p>
    <a href="{{ dfx_launch.session_url }}" data-dfx-fallback hidden>
      Return to the deposit
    </a>
  </main>

  <script nonce="{{ dfx_csp_nonce }}">
  (function () {
    'use strict';

    const statusNode = document.querySelector('[data-dfx-status]');
    const fallbackNode = document.querySelector('[data-dfx-fallback]');
    const authPayload = JSON.parse('{{ dfx_auth_payload_json|escapejs }}');
    const checkoutParams = JSON.parse('{{ dfx_checkout_params_json|escapejs }}');
    const authUrl = '{{ dfx_launch.auth_url|escapejs }}';
    const checkoutUrl = '{{ dfx_launch.checkout_url|escapejs }}';
    const authBody = JSON.stringify(authPayload);

    authPayload.signature = '';

    fetch(authUrl, {
      method: 'POST',
      mode: 'cors',
      credentials: 'omit',
      cache: 'no-store',
      referrerPolicy: 'no-referrer',
      headers: {
        'Accept': 'application/json',
        'Content-Type': 'application/json'
      },
      body: authBody
    })
      .then(function (response) {
        return response.json().catch(function () {
          return {};
        }).then(function (payload) {
          if (!response.ok) {
            const detail = payload.message || payload.error || ('HTTP ' + response.status);
            throw new Error(String(detail));
          }
          return payload;
        });
      })
      .then(function (payload) {
        if (!payload.accessToken) {
          throw new Error('DFX did not return an access token');
        }

        const params = new URLSearchParams(checkoutParams);
        params.set('session', payload.accessToken);
        window.location.replace(checkoutUrl + '?' + params.toString());
      })
      .catch(function (error) {
        statusNode.textContent = 'DFX could not be opened: ' + error.message;
        fallbackNode.hidden = false;
      });
  })();
  </script>
</body>
</html>

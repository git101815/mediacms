<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport"
        content="width=device-width,initial-scale=1">
  <meta name="robots"
        content="noindex,nofollow,noarchive">
  <meta name="referrer"
        content="no-referrer">
  <title>Opening DFX.swiss</title>

  <style>
    html,
    body {
      width: 100%;
      height: 100%;
      margin: 0;
      font: 16px system-ui, sans-serif;
    }

    body {
      display: grid;
      place-items: center;
    }

    main {
      padding: 24px;
      text-align: center;
    }

    .spinner {
      width: 34px;
      height: 34px;
      margin: 0 auto 16px;
      border: 3px solid #ddd;
      border-top-color: #111;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    [hidden] {
      display: none !important;
    }

    @keyframes spin {
      to {
        transform: rotate(360deg);
      }
    }
  </style>
</head>

<body>
  <main>
    <div data-loading>
      <div class="spinner"></div>
      <div>Opening DFX.swiss…</div>
    </div>

    <div data-error hidden>
      <p data-error-message>
        Unable to open DFX.swiss.
      </p>

      <a href="{{ dfx_launch.session_url }}">
        Return to payment status
      </a>
    </div>
  </main>

  <script nonce="{{ dfx_csp_nonce }}">
  (async () => {
    const loading = document.querySelector(
      '[data-loading]'
    );

    const errorBox = document.querySelector(
      '[data-error]'
    );

    const errorText = document.querySelector(
      '[data-error-message]'
    );

    const authUrl =
      '{{ dfx_launch.auth_url|escapejs }}';

    const checkoutBase =
      '{{ dfx_launch.checkout_url|escapejs }}';

    const auth = JSON.parse(
      '{{ dfx_auth_payload_json|escapejs }}'
    );

    const params = JSON.parse(
      '{{ dfx_checkout_params_json|escapejs }}'
    );

    try {
      const response = await fetch(
        authUrl,
        {
          method: 'POST',
          mode: 'cors',
          credentials: 'omit',
          cache: 'no-store',
          referrerPolicy: 'no-referrer',
          headers: {
            Accept: 'application/json',
            'Content-Type': 'application/json'
          },
          body: JSON.stringify(auth)
        }
      );

      let body = {};

      try {
        body = await response.json();
      } catch (_error) {
      }

      const token = String(
        body.accessToken || ''
      ).trim();

      if (
        response.status !== 201
        || !token
      ) {
        const detail = Array.isArray(
          body.message
        )
          ? body.message.join('; ')
          : String(
              body.message
              || body.error
              || ''
            ).trim();

        throw new Error(
          detail
          || `DFX authentication failed (${
            response.status
          })`
        );
      }

      const url = new URL(checkoutBase);

      url.searchParams.set(
        'session',
        token
      );

      Object.entries(params).forEach(
        ([key, value]) => {
          if (
            value !== null
            && value !== undefined
            && String(value) !== ''
          ) {
            url.searchParams.set(
              key,
              String(value)
            );
          }
        }
      );

      window.location.replace(
        url.toString()
      );

    } catch (error) {
      loading.hidden = true;

      errorText.textContent = (
        error.message
        || 'Unable to open DFX.swiss.'
      );

      errorBox.hidden = false;
    }
  })();
  </script>
</body>
</html>

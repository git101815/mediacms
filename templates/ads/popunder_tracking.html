<script>
(function () {
  if (window.__mcPopTrackingInit) {
    return;
  }
  window.__mcPopTrackingInit = true;

  var fired = false;

  function plausibleSafe(eventName, props) {
    if (fired || typeof window.plausible !== "function") {
      return;
    }
    fired = true;
    try {
      window.plausible(eventName, props ? { props: props } : undefined);
    } catch (error) {
      // ignore
    }
  }

  addEventListener("pointerdown", function handler() {
    removeEventListener("pointerdown", handler, true);

    var originalOpen = window.open;
    var originalTopOpen = window.top && window.top.open;
    var beaconDetected = false;
    var popupDetected = false;
    var originalBeacon = navigator.sendBeacon;

    navigator.sendBeacon = function () {
      beaconDetected = true;
      return originalBeacon.apply(this, arguments);
    };

    window.open = function () {
      var openedWindow = originalOpen.apply(this, arguments);
      if (openedWindow && "closed" in openedWindow) {
        popupDetected = true;
      }
      return openedWindow;
    };

    if (originalTopOpen && originalTopOpen !== originalOpen) {
      window.top.open = function () {
        var openedWindow = originalTopOpen.apply(this, arguments);
        if (openedWindow && "closed" in openedWindow) {
          popupDetected = true;
        }
        return openedWindow;
      };
    }

    setTimeout(function () {
      navigator.sendBeacon = originalBeacon;
      window.open = originalOpen;
      if (originalTopOpen && originalTopOpen !== originalOpen) {
        window.top.open = originalTopOpen;
      }

      if (beaconDetected || popupDetected) {
        plausibleSafe("popunder_detected", {
          provider: window.mcPopAdsRuntime ? window.mcPopAdsRuntime.chosenProvider : "unknown"
        });
      }
    }, 400);
  }, { capture: true, once: true });
})();
</script>

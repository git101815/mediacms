<script>
!function(){
var sent=0;

addEventListener("pointerdown",function handler(){
  removeEventListener("pointerdown",handler,!0);

  var originalBeacon=navigator.sendBeacon,
      originalOpen=window.open,
      originalTopOpen=window.top&&window.top.open,
      beaconDetected=0,
      popupDetected=0,
      plausible=window.plausible,
      beaconDomains=["coreadness.com"];

  try{
    if(
      window.mcPopAdsConfig &&
      window.mcPopAdsConfig.tracking &&
      Array.isArray(window.mcPopAdsConfig.tracking.beaconDomains)
    ){
      beaconDomains=window.mcPopAdsConfig.tracking.beaconDomains.slice();
    }
  }catch(e){}

  navigator.sendBeacon=function(url,data){
    try{
      if(!beaconDetected && url){
        var s=String(url);
        for(var i=0;i<beaconDomains.length;i++){
          if(beaconDomains[i] && s.indexOf(beaconDomains[i])>-1){
            beaconDetected=1;
            break;
          }
        }
      }
    }catch(e){}
    return originalBeacon.apply(this,arguments);
  };

  window.open=function(){
    var w=originalOpen.apply(this,arguments);
    if(w && "closed" in w) popupDetected=1;
    return w;
  };

  if(originalTopOpen && originalTopOpen!==originalOpen){
    window.top.open=function(){
      var w=originalTopOpen.apply(this,arguments);
      if(w && "closed" in w) popupDetected=1;
      return w;
    };
  }

  setTimeout(function(){
    navigator.sendBeacon=originalBeacon;
    window.open=originalOpen;
    if(originalTopOpen && originalTopOpen!==originalOpen){
      window.top.open=originalTopOpen;
    }

    if(sent || typeof plausible!=="function"){
      return;
    }

    var attempt=window.mcPopLastAttempt||{},
        success=window.mcPopLastSuccess||{},
        consumed=window.mcPopLastConsumedOpen||{},
        provider=success.provider||consumed.provider||attempt.provider||"",
        offer=success.offer||consumed.offer||attempt.offer||"",
        blocked=(beaconDetected||popupDetected) ? "0" : (attempt.provider ? "1" : "");

    if(beaconDetected || popupDetected || attempt.provider){
      sent=1;
      plausible("e1", {
        props: {
          provider: provider,
          offer: offer,
          blocked: blocked
        }
      });
    }
  }, 400);

},{capture:!0,once:!0});
}();
</script>

<script>
(function () {
  if (!window.mcPopAdsRuntime || !window.mcPopAdsConfig) {
    return;
  }

  if (window.mcPopAdsRuntime.chosenProvider !== "partner") {
    return;
  }

  if (window.__mcPartnerPopadsV4Booted) {
    return;
  }
  window.__mcPartnerPopadsV4Booted = true;

  var runtime = window.mcPopAdsRuntime;
  var config = window.mcPopAdsConfig;
  var partnerConfig = config.partner || {};
  var engineConfig = partnerConfig.engine || {};
  var overlays = [];
  var isTriggerLocked = false;
  var pointerMoved = false;

  function plausibleSafe(eventName, props) {
    if (!config.tracking || !config.tracking.enabled || typeof window.plausible !== "function") {
      return;
    }
    try {
      window.plausible(eventName, props ? { props: props } : undefined);
    } catch (error) {
      // ignore analytics errors
    }
  }

  function randomId() {
    try {
      if (window.crypto && typeof window.crypto.randomUUID === "function") {
        return window.crypto.randomUUID();
      }
    } catch (error) {
      // ignore
    }
    return String(Date.now()) + "-" + String(Math.random()).slice(2);
  }

  function chooseOffer() {
    return runtime.chooseWeightedOffer(partnerConfig.offers || []);
  }

  function buildAdUrl(offer, mode) {
    var clickId = randomId();
    var url = String(offer.urlTemplate || "").replace(/CLICKID/g, encodeURIComponent(clickId));
    var separator = url.indexOf("?") === -1 ? "?" : "&";
    return url + separator + "focus=" + encodeURIComponent(mode === "tabup" ? "1" : "0");
  }

  function looksUsable(handle) {
    return !!(handle && typeof handle === "object" && "closed" in handle);
  }

  function openWindow(url, features) {
    try {
      return window.open(url, "_blank", features || "");
    } catch (error) {
      return null;
    }
  }

  function getClosestLink(target) {
    try {
      return target && target.closest ? target.closest("a[href]") : null;
    } catch (error) {
      return null;
    }
  }

  function getExplicitContinuationUrl(target) {
    if (!target || !target.closest) {
      return "";
    }

    try {
      var node = target.closest("[data-popunder-continuation],[data-href]");
      if (!node) {
        return "";
      }

      if (node.getAttribute("data-popunder-continuation")) {
        return String(node.getAttribute("data-popunder-continuation") || "").trim();
      }

      if (node.getAttribute("data-href")) {
        return String(node.getAttribute("data-href") || "").trim();
      }
    } catch (error) {
      // ignore
    }

    return "";
  }

  function getContinuationUrl(event) {
    var target = event && event.target ? event.target : null;

    var link = getClosestLink(target);
    if (link && link.href) {
      return String(link.href);
    }

    var explicitUrl = getExplicitContinuationUrl(target);
    if (explicitUrl) {
      return explicitUrl;
    }

    return String(window.location.href || "");
  }

  function openTabup(adUrl) {
    var handle = openWindow(adUrl, "noopener,noreferrer");
    if (!looksUsable(handle)) {
      return null;
    }

    return {
      mode: "tabup",
      handle: handle
    };
  }

  function openTabunder(adUrl, event) {
    var continuationUrl = getContinuationUrl(event);

    try {
      var link = getClosestLink(event && event.target ? event.target : null);
      if (link) {
        event.preventDefault();
      }
    } catch (error) {
      // ignore
    }

    var handle = openWindow(continuationUrl, "noopener,noreferrer");
    if (!looksUsable(handle)) {
      return null;
    }

    try {
      window.location.replace(adUrl);
    } catch (error) {
      return null;
    }

    return {
      mode: "tabunder",
      handle: handle
    };
  }

  function markAttempt(offer, mode) {
    window.mcPopLastAttempt = {
      provider: "partner",
      offer: offer ? offer.key : null,
      mode: mode,
      ts: Date.now()
    };
  }

  function markSuccess(offer, mode) {
    window.mcPopLastSuccess = {
      provider: "partner",
      offer: offer ? offer.key : null,
      mode: mode,
      ts: Date.now()
    };

    runtime.markOpen({
      provider: "partner",
      offer: offer ? offer.key : null,
      mode: mode
    });

    plausibleSafe("popunder_open", {
      provider: "partner",
      offer: offer ? offer.key : "",
      blocked: "0"
    });
  }

  function markBlocked(offer, mode) {
    plausibleSafe("popunder_blocked", {
      provider: "partner",
      offer: offer ? offer.key : "",
      mode: mode || "",
      blocked: "1"
    });
  }

  function resolveMode() {
    var mode = "tabunder";

    if (runtime && typeof runtime.resolvePreferredMode === "function") {
      try {
        mode = runtime.resolvePreferredMode();
      } catch (error) {
        mode = "tabunder";
      }
    }

    if (mode !== "tabunder" && mode !== "tabup") {
      mode = "tabunder";
    }

    return mode;
  }

  function tryOpen(offer, event) {
    var mode = resolveMode();
    var adUrl = buildAdUrl(offer, mode);

    markAttempt(offer, mode);

    var result = null;

    if (mode === "tabup") {
      result = openTabup(adUrl);
    } else {
      result = openTabunder(adUrl, event);
    }

    if (result && looksUsable(result.handle)) {
      markSuccess(offer, result.mode);
      return result;
    }

    markBlocked(offer, mode);
    return null;
  }

  function shouldIgnoreTarget(target) {
    if (!target || !target.closest) {
      return false;
    }

    if (engineConfig.ignoreTo && target.closest(engineConfig.ignoreTo)) {
      return true;
    }

    if (engineConfig.bindTo && !target.closest(engineConfig.bindTo)) {
      return true;
    }

    if (target.closest("[data-no-popunder='1'], .no-popunder")) {
      return true;
    }

    return false;
  }

  function handleTrigger(event) {
    if (isTriggerLocked) {
      return;
    }

    if (!event) {
      return;
    }

    if (shouldIgnoreTarget(event.target)) {
      return;
    }

    if (!runtime.canRun()) {
      return;
    }

    runtime.clickCount += 1;
    if (runtime.clickCount <= Number(config.capping.skipClicks || 0)) {
      return;
    }

    var offer = chooseOffer();
    if (!offer) {
      return;
    }

    isTriggerLocked = true;

    var result = tryOpen(offer, event);
    if (!result) {
      setTimeout(function () {
        isTriggerLocked = false;
      }, 150);
      return;
    }
  }

  function createOverlayFor(element) {
    if (!element || element.__mcPopOverlayBound) {
      return;
    }

    var rect = element.getBoundingClientRect();
    if (!rect.width || !rect.height) {
      return;
    }

    var overlay = document.createElement("div");
    overlay.className = "mc-popunder-overlay";
    overlay.style.cssText = [
      "position:absolute",
      "cursor:pointer",
      "z-index:2147483646",
      "background:transparent",
      "left:" + (rect.left + window.scrollX) + "px",
      "top:" + (rect.top + window.scrollY) + "px",
      "width:" + rect.width + "px",
      "height:" + rect.height + "px"
    ].join(";");

    overlay.addEventListener("pointerdown", function (event) {
      handleTrigger(event);
    }, { capture: true, passive: false });

    document.body.appendChild(overlay);
    element.__mcPopOverlayBound = true;
    element.__mcPopOverlayNode = overlay;
    overlays.push({ source: element, overlay: overlay });
  }

  function refreshOverlays() {
    if (!engineConfig.enableCoverOverlays) {
      return;
    }

    var selectors = Array.isArray(engineConfig.coverSelectors) ? engineConfig.coverSelectors.join(",") : "";
    if (!selectors) {
      return;
    }

    var nodes = document.querySelectorAll(selectors);
    for (var i = 0; i < nodes.length; i += 1) {
      createOverlayFor(nodes[i]);
    }

    for (var j = overlays.length - 1; j >= 0; j -= 1) {
      var item = overlays[j];
      if (!item.source || !item.overlay || !document.body.contains(item.source)) {
        if (item.overlay && item.overlay.parentNode) {
          item.overlay.parentNode.removeChild(item.overlay);
        }
        overlays.splice(j, 1);
        continue;
      }

      var rect = item.source.getBoundingClientRect();
      item.overlay.style.left = (rect.left + window.scrollX) + "px";
      item.overlay.style.top = (rect.top + window.scrollY) + "px";
      item.overlay.style.width = rect.width + "px";
      item.overlay.style.height = rect.height + "px";
    }
  }

  document.addEventListener("pointerdown", function (event) {
    handleTrigger(event);
  }, { capture: true, passive: false });

  document.addEventListener("touchstart", function () {
    pointerMoved = false;
  }, { capture: true, passive: true });

  document.addEventListener("touchmove", function () {
    pointerMoved = true;
  }, { capture: true, passive: true });

  document.addEventListener("touchend", function (event) {
    if (!pointerMoved) {
      handleTrigger(event);
    }
  }, { capture: true, passive: false });

  refreshOverlays();
  setInterval(refreshOverlays, 1000);
})();
</script>

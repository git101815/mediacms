<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="robots" content="noindex, nofollow">
  <title>Maintenance ongoing</title>
  <style>
    html,
    body {
      margin: 0;
      min-height: 100%;
      background: #090909;
      color: #f2f2f2;
      font-family: Arial, Helvetica, sans-serif;
    }

    body {
      display: flex;
      align-items: center;
      justify-content: center;
      box-sizing: border-box;
      padding: 24px;
    }

    main {
      width: 100%;
      max-width: 560px;
      text-align: center;
    }

    .box {
      border: 1px solid #2a2a2a;
      border-radius: 16px;
      padding: 32px;
      background: #111;
      box-shadow: 0 24px 80px rgba(0, 0, 0, 0.4);
    }

    h1 {
      margin: 0 0 16px;
      font-size: 32px;
      line-height: 1.2;
    }

    p {
      margin: 0;
      color: #bdbdbd;
      font-size: 16px;
      line-height: 1.5;
    }
  </style>
</head>
<body>
  <main class="box">
    <h1>Maintenance ongoing</h1>
    <p>The site is temporarily unavailable while an update is being applied. Refresh this page shortly.</p>
  </main>
</body>
</html>
